name: LXutils
version: '1.6.0'
main: org.whitecn.LXutils
api-version: '1.20'
prefix: LXutils
load: STARTUP
authors: [ WHITECN_凌星 ]
description: 凌星的插件工具合集

commands:
  tofunction:
    description: '主方法--把一列命令方块按顺序转成函数'
    usage: /tofunction x1 y1 z1 x2 y2 z2 函数文件名(不包括后缀)
    permission: lxutils.tofunction
  tofunctionconfirm:
    description: '当文件存在的时候，选择要执行的操作'
    usage: /tofunctionconfirm [overwrite|append|cancel]
    permission: lxutils.tofunction
  dmgmeter:
    description: '控制伤害量计'
    usage: /dmgmeter [switch|color|digits]
    permission: lxutils.dmgmeter
  sizecalc:
    description: '计算一个区间内的方块并分组/将给定数据分组 以便计算材料量'
    usage: /sizecalc <x1> <y1> <z1> <x2> <y2> <z2> 或 /sizecalc <方块总数>
    permission: lxutils.sizecalc
  sizecalculator:
    description: '计算一个区间内的方块并分组/将给定数据分组 以便计算材料量'
    usage: /sizecalculator <x1> <y1> <z1> <x2> <y2> <z2> 或 /sizecalculator <方块总数>
    permission: lxutils.sizecalc
  fakeop:
    description: '(整蛊用)给一个玩家假op 全服广播'
    usage: /fakeop <ID>
    permission: lxutils.fakeop
  dmj:
    description: '操作弹幕姬开关和更改监听的房间'
    usage: /dmj setroomid <房间号> 或 /dmj switch
    permission: lxutils.dmj
  miraclefinder:
    description: 扫描附近的结构
    usage: /<command> [option]
    aliases: [ mfinder, findstructure ]
    permission: lxutils.miraclefinder

permissions:
  # ========== 基础权限 ==========
  lxutils.use:
    description: "允许使用所有 LXutils 命令"
    default: op
    children:
      lxutils.tofunction: true
      lxutils.tofunction.confirm: true
      lxutils.dmgmeter: true
      lxutils.sizecalc: true
      lxutils.fakeop: true
      lxutils.dmj: true
      lxutils.miraclefinder: true

  # ========== tofunction ==========
  lxutils.tofunction:
    description: "允许使用 /tofunction 命令"
    default: op

  # ========== dmgmeter ==========
  lxutils.dmgmeter:
    description: "允许使用 /dmgmeter 命令"
    default: true

  # ========== sizecalc 系列 ==========
  lxutils.sizecalc:
    description: "允许使用 /sizecalc 和 /sizecalculator 命令"
    default: true

  # ========== fakeop ==========
  lxutils.fakeop:
    description: "允许使用 /fakeop 命令（整蛊用，建议仅 OP 使用）"
    default: op

  # ========== dmj ==========
  lxutils.dmj:
    description: "允许使用 /dmj 命令"
    default: true

  # ========== miraclefinder ==========
  lxutils.miraclefinder:
    description: "允许使用 /miraclefinder 命令（别名: /mfinder, /findstructure）"
    default: true